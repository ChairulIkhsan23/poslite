services: 

  # MySQL Database Service
  mysql:
    image: mysql:8.0
    container_name: poslite-mysql
    restart: unless-stopped 
    environment:
      MYSQL_DATABASE: poslite_db
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_PASSWORD: secret123
      MYSQL_USER: poslite_user
    ports:
      - "3309:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d  
    command: --default-authentication-plugin=mysql_native_password 
    networks:
      - poslite-network

  # PhpMyAdmin Service
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: poslite-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: poslite_user
      PMA_PASSWORD: secret123
    ports:
      - "8082:80"
    depends_on:
      - mysql
    networks:
      - poslite-network

  # Laravel Application Service
  laravel-app:
    build: 
      context: ./backend
      dockerfile: Dockerfile 
    container_name: poslite-laravel-app
    restart: unless-stopped
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: poslite_db
      DB_USERNAME: poslite_user
      DB_PASSWORD: secret123
      APP_ENV: local  
      APP_DEBUG: "true"  
    volumes:
      - ./backend:/var/www/html   
    expose:
      - "8000"
    depends_on:
      - mysql
    healthcheck:
      test: ["CMD", "php", "artisan", "tinker", "--version"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - poslite-network

  # Next.js Application Service
  nextjs-app:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: poslite-nextjs-app
    restart: unless-stopped
    environment:
      NODE_ENV: development  
      WATCHPACK_POLLING: "true"  
    volumes:
      - ./frontend:/app 
    expose:
      - "3000"
    depends_on:
      - laravel-app
    networks:
      - poslite-network

  nginx:
    image: nginx:alpine
    container_name: poslite-nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html 
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - laravel-app
      - nextjs-app
    networks:
      - poslite-network

# Volumes for MySQL data persistence
volumes:
  mysql-data:

# Networks for inter-service communication  
networks:
  poslite-network:
    driver: bridge